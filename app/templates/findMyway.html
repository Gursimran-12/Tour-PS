<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Find My Way | AI Tour Planner</title>

  <!-- Google Font (same as main) -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    /* ========================
       Exact main theme variables + styles
       (Kept identical to your main pastel theme)
       ======================== */
    :root {
      --bg: #fffaf8;
      --surface: #ffffff;
      --pastel-sky: #c2e2f4;
      --pastel-mint: #cdeee6;
      --pastel-peach: #f7d4bf;
      --pastel-lav: #e0c6f2;
      --pastel-sand: #ffe8c9;
      --accent: #6b3be8;
      --text: #253238;
      --muted: #606366;
      --radius: 14px;
      --card-shadow: 0 18px 40px rgba(35, 35, 55, 0.10);
      --glass: rgba(255, 255, 255, 0.88);
      --focus: 3px rgba(107, 59, 232, 0.18);
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: "Poppins", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: linear-gradient(180deg, var(--pastel-sky) 0%, var(--bg) 62%);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* PREFERS REDUCED MOTION */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition: none !important;
      }
    }

    /* NAVBAR (same as main) */
    .navbar {
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.72));
      padding: 1.05rem 1rem;
      transition: padding .28s ease, box-shadow .28s ease, backdrop-filter .28s ease;
      z-index: 60;
      backdrop-filter: blur(6px);
    }

    .navbar .navbar-brand {
      font-weight: 800;
      font-size: 1.35rem;

      background: linear-gradient(90deg,
          #6b3be8,
          #8b5cf6);

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      letter-spacing: 0.3px;

      transition: 0.3s ease;
    }

    .nav-link {
      color: var(--text) !important;

      font-weight: 500;
      font-size: 0.95rem;

      padding:
        0.65rem 1rem !important;

      border-radius: 12px;

      transition:
        all 0.3s ease;

      position: relative;
    }

    .nav-link:hover {
      color: var(--accent) !important;

      background:
        rgba(107, 59, 232, 0.08);

      transform:
        translateY(-2px);
    }

    .nav-link.active {

      background:
        rgba(107, 59, 232, 0.10);

      color:
        var(--accent) !important;

      border-radius: 12px;

      font-weight: 600;
    }

    .nav-link i {
      font-size: 0.9rem;
      margin-right: 6px;
      vertical-align: middle;
    }

    .nav-link {
      white-space: nowrap;
    }

    .navbar.shrink {
      padding: .46rem 1rem;
      box-shadow: 0 12px 28px rgba(20, 20, 30, 0.07);
      backdrop-filter: blur(8px);
    }

    .nav-link:focus {
      outline: none;
      box-shadow: 0 0 0 var(--focus);
      border-radius: 6px;
    }

    /* Page header */
    .page-hero {
      padding-top: 120px;
      padding-bottom: 18px;
      text-align: center;
    }

    .page-hero h2 {
      margin: 0;
      font-size: clamp(1.4rem, 3.2vw, 2.2rem);
      font-weight: 800;
      color: var(--text);
    }

    .page-hero p.muted {
      color: var(--muted);
      margin-top: 8px;
    }

    /* main container card */
    .panel {
      margin-top: 18px;
      background: var(--glass);
      padding: 18px;
      border-radius: 18px;
      box-shadow: var(--card-shadow);
    }

    /* categories buttons */
    #categories {
      margin-top: 10px;
    }

    #categories button {
      margin: 10px;
      padding: 12px 24px;
      border-radius: 14px;
      border: none;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      color: var(--text);
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      transition: all .25s ease;
    }

    #categories button:hover {
      transform: translateY(-5px);
      background: linear-gradient(90deg, var(--accent), #8a6cff);
      color: white;
    }


    /* results */
    #results {
      margin-top: 18px;
      background: rgba(255, 255, 255, 0.9);
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(40, 40, 90, 0.04);
      max-height: 260px;
      overflow-y: auto;
    }

    .place {
      padding: 16px;
      margin-bottom: 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: all .25s ease;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
    }

    .place:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 40px rgba(107, 59, 232, 0.15);
      border-color: rgba(107, 59, 232, 0.25);
    }

    /* map styling */
    #map {
      height: 500px;
      margin-top: 22px;
      border-radius: 22px;
      overflow: hidden;
      border: 4px solid rgba(255, 255, 255, 0.7);
      box-shadow:
        0 20px 50px rgba(0, 0, 0, 0.12),
        0 0 0 8px rgba(255, 255, 255, 0.18);
    }

    /* route info */
    #routeInfo {
      margin-top: 18px;
      padding: 20px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(14px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
    }

    .transport-card {
      padding: 16px;
      margin-bottom: 14px;
      border-radius: 16px;
      background: white;
      cursor: pointer;
      transition: all .25s ease;
      border: 1px solid rgba(0, 0, 0, 0.05);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.06);
    }

    .transport-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 45px rgba(107, 59, 232, 0.16);
    }

    /* dynamic schedule button */
    .dynamic-btn {
      display: inline-block;
      margin-top: 18px;
      padding: 12px 28px;
      border-radius: 999px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(90deg, var(--accent), #8a6cff);
      box-shadow: 0 12px 30px rgba(107, 59, 232, 0.12);
      border: none;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .place.active-place {
      border: 2px solid #6b3be8;
      background: linear-gradient(135deg,
          rgba(107, 59, 232, 0.10),
          rgba(138, 108, 255, 0.12));
      transform: scale(1.01);
    }

    .dynamic-btn:hover {
      transform: translateY(-4px)
    }

    /* footer (same as main) */
    footer {
      padding: 36px 0;
      background: linear-gradient(90deg, var(--pastel-sand), rgba(255, 255, 255, 0.9));
      color: var(--text);
      margin-top: 24px;
    }

    /* responsive tweaks */
    @media (max-width:768px) {
      .page-hero {
        padding-top: 100px
      }

      #map {
        height: 320px;
      }

      #results {
        max-height: 180px;
      }
    }

    .transport-card.active-mode {
      border: 2px solid #6b3be8;
      background: linear-gradient(135deg,
          rgba(107, 59, 232, 0.08),
          rgba(138, 108, 255, 0.10));
      transform: scale(1.02);
    }
  </style>
</head>

<body>

  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
      <a class="navbar-brand" href="/">AI Tour Planner</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-expanded="false"
        aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">

          <li class="nav-item">
            <a class="nav-link" href="/home">
              <i class="fas fa-house me-1"></i>
              Home
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="/sightseeing_suggestion">
              <i class="fas fa-location-dot me-1"></i>
              Locations
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="/hotel">
              <i class="fas fa-hotel me-1"></i>
              Hotels
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link active" href="/findmyway">
              <i class="fas fa-map-location-dot me-1"></i>
              Find My Way
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="/hotels_reviews">
              <i class="fas fa-star me-1"></i>
              Reviews
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="/routefinder">
              <i class="fas fa-route me-1"></i>
              Route Finder
            </a>
          </li>

        </ul>
      </div>
    </div>
  </nav>


  <!-- Page header / hero area -->
  <header class="page-hero container text-center" role="banner" aria-label="Find My Way hero">
    <h2>Find My Way — Local places & routes</h2>
    <p class="muted">Discover local landmarks, attractions, and the best routes — all in one place.</p>
  </header>

  <!-- Main panel -->
  <main class="container panel" id="main-content" role="main">
    <!-- status -->
    <div class="text-center">
      <p id="status">Detecting your location...</p>
    </div>

    <!-- categories -->
    <div class="text-center" id="categories" style="display:none;">
      <h5 class="mb-3">Select a category:</h5>
      <button onclick="fetchPlaces('education.university')">Educational</button>
      <button onclick="fetchPlaces('tourism.sights')">Historical</button>
      <button onclick="fetchPlaces('religion.place_of_worship')">Religious</button>
      <button onclick="fetchPlaces('tourism.museum')">Museums</button>
      <button onclick="fetchPlaces('heritage')">Heritage</button>
    </div>

    <!-- results -->
    <div id="results" aria-live="polite"></div>

    <!-- map -->
    <div id="map" aria-label="Map showing user location and places"></div>

    <!-- route info -->
    <div id="routeInfo" class="text-center" aria-live="polite"></div>

    <!-- dynamic schedule -->
    <div class="d-flex justify-content-center mt-4">
      <button id="dynamicScheduleBtn" class="dynamic-btn">
        <i class="bi bi-calendar-event me-2"></i>
        Dynamic Schedule
      </button>
    </div>
  </main>

  <!-- Footer (same general footer as main) -->
  <footer>
    <div class="container text-center">
      <div class="row">
        <hr>
        <p>&copy; 2025 GNDEC | Designed by G13</p>
      </div>
  </footer>

  <!-- Leaflet & Bootstrap -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Shrink navbar on scroll (same logic as main)
    (function () {
      const nav = document.querySelector('.navbar');
      const shrinkPoint = 80;
      const onScroll = () => { window.scrollY > shrinkPoint ? nav.classList.add('shrink') : nav.classList.remove('shrink') };
      window.addEventListener('scroll', onScroll, { passive: true }); onScroll();
    })();
  </script>

  <!-- Original page JavaScript (left intact) -->
  <script>
    let userLat, userLng, map, markers, routeLayer;

    const sourceIcon = L.icon({
      iconUrl: 'https://cdn-icons-png.flaticon.com/512/447/447031.png',
      iconSize: [40, 40],
      iconAnchor: [20, 40]
    });

    const destIcon = L.icon({
      iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
      iconSize: [40, 40],
      iconAnchor: [20, 40]
    });
    function getModeIcon(mode) {

      mode = mode.toLowerCase();

      if (mode.includes("drive"))
        return '<i class="bi bi-car-front-fill text-primary"></i>';

      if (mode.includes("truck"))
        return '<i class="bi bi-truck-front-fill text-warning"></i>';

      if (mode.includes("bike"))
        return '<i class="bi bi-bicycle text-success"></i>';

      if (mode.includes("walk"))
        return '<i class="bi bi-person-walking text-dark"></i>';

      if (mode.includes("public"))
        return '<i class="bi bi-bus-front-fill text-danger"></i>';

      return '<i class="bi bi-signpost-fill"></i>';
    }

    async function detectLocation() {
      if (!navigator.geolocation) {
        document.getElementById("status").innerText = "Geolocation not supported";
        return;
      }
      navigator.geolocation.getCurrentPosition(async pos => {
        userLat = pos.coords.latitude; userLng = pos.coords.longitude;
        try {

          const res = await fetch("/api/reverse", {

            method: "POST",

            headers: {
              "Content-Type": "application/json"
            },

            body: JSON.stringify({

              lat: userLat,
              lng: userLng

            })
          });

          const data = await res.json();

          if (data.success) {

            document.getElementById("status").innerHTML = `
    <i class="bi bi-geo-alt-fill text-danger me-2"></i>
    You are at: <strong>${data.address}</strong>
  `;

          } else {

            document.getElementById("status").innerHTML = `
    <i class="bi bi-geo-alt-fill text-danger me-2"></i>
    Location detected
  `;
          }
        } catch (e) {
          document.getElementById("status").innerHTML = `<i class="bi bi-geo-alt-fill text-danger me-2"></i> Location detected`;
        }
        document.getElementById("categories").style.display = "block";

        map = L.map('map').setView([userLat, userLng], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        markers = L.layerGroup().addTo(map);
        routeLayer = L.layerGroup().addTo(map);
        L.marker([userLat, userLng], { icon: sourceIcon })
          .addTo(markers)
          .bindPopup("Source Location")
          .openPopup();

        L.circle([userLat, userLng], {
          radius: 120,
          color: "#28a745",
          fillColor: "#28a745",
          fillOpacity: 0.2,
          weight: 3
        }).addTo(markers);
      }, err => {
        document.getElementById("status").innerText = "Unable to detect location: " + (err.message || err.code);
        document.getElementById("categories").style.display = "block";
      });
    }

    async function fetchPlaces(category) {
      const res = await fetch("/api/places", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ lat: userLat, lng: userLng, category })
      });
      if (!res.ok) {
        console.error("Server error");
        return;
      }
      let j;

      try {
        j = await res.json();
      } catch (e) {
        console.error("Invalid JSON response");
        return;
      }
      let html = "<h5>Places found:</h5>";
      if (markers) markers.clearLayers();
      if (routeLayer) routeLayer.clearLayers();

      /* SOURCE MARKER AGAIN */
      if (userLat && userLng) {

        L.marker([userLat, userLng], {
          icon: sourceIcon
        })
          .addTo(markers)
          .bindPopup("Source Location");

        /* SOURCE CIRCLE */
        L.circle([userLat, userLng], {
          radius: 120,
          color: "#28a745",
          fillColor: "#28a745",
          fillOpacity: 0.2,
          weight: 3
        }).addTo(markers);

      }
      j.places
        .filter(p => {

          if (!p.name) return false;

          const name = p.name.trim().toLowerCase();

          const blockedNames = [
            "unnamed",
            "unknown",
            "null",
            "n/a",
            "na",
            "-",
            "no name",
            "unnamed road"
          ];

          return !blockedNames.includes(name);

        })
        .forEach(p => {
          html += `
<div class="place"
onclick="selectPlace(this, ${p.lat}, ${p.lng}, '${(p.name || 'Destination').replace(/'/g, "\\'")}')">

  <div class="d-flex justify-content-between align-items-center">

    <div>
      <strong>${p.name}</strong><br>
      <small>${p.address}</small>
    </div>

    <span class="badge rounded-pill text-bg-primary">
      ${p.distance_km} km
    </span>

  </div>

</div>
`;
          if (markers) L.marker([p.lat, p.lng]).addTo(markers).bindPopup(p.name);
        });
      document.getElementById("results").innerHTML = html;
    }

    function selectPlace(el, lat, lng, name) {

      document.querySelectorAll('.place')
        .forEach(place => place.classList.remove('active-place'));

      el.classList.add('active-place');

      drawRoute(lat, lng, name);
    }

    async function drawRoute(lat, lng, name) {
      if (routeLayer) routeLayer.clearLayers();
      const res = await fetch("/api/route_coords", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ src_lat: userLat, src_lng: userLng, dst_lat: lat, dst_lng: lng })
      });
      let j;

      try {
        j = await res.json();
      } catch (e) {
        console.error("Invalid JSON response");
        return;
      }

      if (j.modes) {
        let infoHtml = "<h5>Available Transport Modes (click to view route):</h5><ul style='list-style:none;padding-left:0;'>";
        j.modes.forEach((m, idx) => {
          if (m.error) {
            infoHtml += `
<li class="route-error">
  <i class="bi bi-x-circle-fill text-danger me-2"></i>
  ${m.label}: ${m.error}
</li>`;
          } else {
            infoHtml += `
<div class="transport-card"
onclick="selectTransportMode(this, ${idx}, '${(name || 'Destination').replace(/'/g, "\\'")}')">

  <div class="d-flex justify-content-between align-items-center">

    <div>
      <h6 class="mb-1 fw-bold">${getModeIcon(m.label)} ${m.label}</h6>

      <small class="text-muted">
        ${m.distance_km} km • ${m.duration_min} min
      </small>
    </div>

    <div class="text-end">
      ${m.estimated_fare_inr
                ? `<span class="badge bg-success">₹${m.estimated_fare_inr}</span>`
                : ""}
    </div>

  </div>

</div>
`;
          }
        });
        infoHtml += "</ul>";
        document.getElementById("routeInfo").innerHTML = infoHtml;

        window.currentRoutes = j.modes;
        window.currentDest = { lat, lng, name };
        /* AUTO SHOW FIRST ROUTE */
        showRoute(0, name);
      } else {
        document.getElementById("routeInfo").innerText = "No routes returned.";
      }
    }

    function selectTransportMode(el, idx, name) {

      document.querySelectorAll('.transport-card')
        .forEach(card => card.classList.remove('active-mode'));

      el.classList.add('active-mode');

      showRoute(idx, name);
    }

    function showRoute(idx, name) {
      if (routeLayer) routeLayer.clearLayers();
      const route = window.currentRoutes && window.currentRoutes[idx];
      if (!route || !route.geometry) return;

      const coords = route.geometry.map(c => [c[1], c[0]]);
      // GLOW EFFECT
      L.polyline(coords, {
        color: "#ff4d4d",
        weight: 18,
        opacity: 0.22,
        lineCap: 'round',
        lineJoin: 'round'
      }).addTo(routeLayer);

      // MAIN ROUTE
      const poly = L.polyline(coords, {
        color: "#ff0000",
        weight: 7,
        opacity: 1,
        lineCap: 'round',
        lineJoin: 'round'
      }).addTo(routeLayer);
      if (map) map.fitBounds(poly.getBounds(), { padding: [30, 30] });

      /* SOURCE AGAIN */
      L.marker([userLat, userLng], {
        icon: sourceIcon
      })
        .addTo(routeLayer)
        .bindPopup("Source Location");

      L.circle([userLat, userLng], {
        radius: 120,
        color: "#28a745",
        fillColor: "#28a745",
        fillOpacity: 0.2,
        weight: 3
      }).addTo(routeLayer);

      L.marker(
        [window.currentDest.lat, window.currentDest.lng],
        { icon: destIcon }
      )
        .addTo(routeLayer)
        .bindPopup("Destination: " + name)
        .openPopup();

      L.circle(
        [window.currentDest.lat, window.currentDest.lng],
        {
          radius: 120,
          color: "#dc3545",
          fillColor: "#dc3545",
          fillOpacity: 0.2,
          weight: 3
        }).addTo(routeLayer);
    }

    // helper to safely use CSS var in JS
    function varColor(fallback) {
      try { return getComputedStyle(document.documentElement).getPropertyValue('--accent') || fallback } catch (e) { return fallback }
    }

    document.getElementById('dynamicScheduleBtn').addEventListener('click', () => {
      if (typeof userLat !== 'undefined' && typeof userLng !== 'undefined') {
        window.location.href = `dynamic.html?lat=${encodeURIComponent(userLat)}&lng=${encodeURIComponent(userLng)}`;
      } else {
        window.location.href = 'dynamic.html';
      }
    });

    // init
    detectLocation();
  </script>

</body>

</html>
