<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Hotels | AI Tour Planner</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- FontAwesome -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    :root {
      --bg: #fffaf8;
      --pastel-sky: #c2e2f4;
      --pastel-peach: #f7d4bf;
      --accent: #6b3be8;
      --muted: #606366;
      --text: #253238;
      --card-shadow: 0 18px 40px rgba(35, 35, 55, 0.08);
      --glass: rgba(255, 255, 255, 0.94);
      --radius: 14px;
      --focus: 3px rgba(107, 59, 232, 0.14);
    }

    html,
    body {
      height: 100%
    }

    body {
      margin: 0;
      font-family: "Poppins", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: linear-gradient(180deg, var(--pastel-sky) 0%, var(--bg) 68%);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* Respect reduced motion */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition: none !important;
      }
    }

    /* NAVBAR (matches index) */
    .navbar {
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.72));
      padding: 1.05rem 1rem;
      transition: padding .28s ease, box-shadow .28s ease, backdrop-filter .28s ease;
      z-index: 60;
      backdrop-filter: blur(6px);
    }

    .navbar .navbar-brand {
      font-weight: 800;
      font-size: 1.35rem;

      background: linear-gradient(90deg,
          #6b3be8,
          #8b5cf6);

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      letter-spacing: 0.3px;

      transition: 0.3s ease;
    }

    .nav-link {
      color: var(--text) !important;

      font-weight: 500;
      font-size: 0.95rem;

      padding:
        0.65rem 1rem !important;

      border-radius: 12px;

      transition:
        all 0.3s ease;

      position: relative;
    }

    .nav-link:hover {
      color: var(--accent) !important;

      background:
        rgba(107, 59, 232, 0.08);

      transform:
        translateY(-2px);
    }

    .nav-link.active {

      background:
        rgba(107, 59, 232, 0.10);

      color:
        var(--accent) !important;

      border-radius: 12px;

      font-weight: 600;
    }

    .nav-link i {
      font-size: 0.9rem;
      margin-right: 6px;
      vertical-align: middle;
    }

    .nav-link {
      white-space: nowrap;
    }

    .navbar.shrink {
      padding: .46rem 1rem;
      box-shadow: 0 12px 28px rgba(20, 20, 30, 0.07);
      backdrop-filter: blur(8px);
    }

    .nav-link:focus {
      outline: none;
      box-shadow: 0 0 0 var(--focus);
      border-radius: 6px;
    }

    /* HERO */
    .hero {
      position: relative;
      background: linear-gradient(120deg, rgba(231, 180, 142, 0.92), rgba(194, 226, 244, 0.88)), url('/static/images1/hotel.jpg') center/cover no-repeat;
      height: 54vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-align: center;
      border-radius: 0 0 24px 24px;
      margin-top: 72px;
      box-shadow: var(--card-shadow);
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.06), rgba(0, 0, 0, 0.14));
    }

    .hero h1 {
      position: relative;
      z-index: 2;
      margin: 0;
      font-size: clamp(1.6rem, 3.2vw, 2.8rem);
      letter-spacing: -0.4px;
      font-weight: 800
    }

    .hero h1 i {
      margin-left: 10px;
      font-size: .9em;
      color: #fff;
      opacity: .95;
    }

    .hero-shape {
      position: absolute;
      border-radius: 50%;
      opacity: .36;
      filter: blur(10px);
      mix-blend-mode: screen;
      z-index: 1;
    }

    .hero-shape.s1 {
      width: 220px;
      height: 220px;
      left: -30px;
      top: 8%;
      background: rgba(205, 238, 230, 0.9);
      animation: floatY 9s ease-in-out infinite;
    }

    .hero-shape.s2 {
      width: 180px;
      height: 180px;
      right: -30px;
      top: 12%;
      background: rgba(224, 198, 242, 0.9);
      animation: floatY 11s ease-in-out infinite;
    }

    @keyframes floatY {
      0% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-10px)
      }

      100% {
        transform: translateY(0)
      }
    }

    /* Search bar (glass card) */
    .search-bar {

      max-width: 1180px;

      margin: -75px auto 30px;

      background: rgba(255, 255, 255, 0.82);

      backdrop-filter: blur(18px);

      -webkit-backdrop-filter: blur(18px);

      border-radius: 28px;

      padding: 32px;

      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.08),
        0 8px 30px rgba(107, 59, 232, 0.08);

      position: relative;

      z-index: 50;

      border: 1px solid rgba(255, 255, 255, 0.6);

      transition:
        transform .3s ease,
        box-shadow .3s ease;
    }

    .search-fields {

      display: flex;

      justify-content: center;

      align-items: center;

      gap: 18px;

      flex-wrap: wrap;
    }

    .search-input {

      flex: 1;

      min-width: 240px;
    }

    .search-btn-wrap {

      display: flex;

      justify-content: center;

      align-items: center;
    }

    .form-control {

      height: 60px;

      border-radius: 18px;

      padding: 14px 20px;

      border: 1px solid rgba(0, 0, 0, 0.08);

      font-size: 1rem;

      background: rgba(255, 255, 255, 0.92);

      transition:
        all 0.25s ease;
    }

    .form-control:focus {

      transform: translateY(-2px);

      border-color: rgba(107, 59, 232, 0.4);

      box-shadow:
        0 12px 30px rgba(107, 59, 232, 0.12);
    }


    .btn-custom {

      background: linear-gradient(135deg,
          #6b3be8,
          #8a6cff);

      color: white;

      border: none;

      height: 60px;

      min-width: 60px;

      border-radius: 18px;

      font-weight: 700;

      font-size: 1rem;

      padding: 0 24px;

      display: flex;

      justify-content: center;

      align-items: center;

      gap: 10px;

      box-shadow:
        0 12px 30px rgba(107, 59, 232, 0.18);

      transition: all 0.3s ease;
    }

    .btn-custom:hover {

      transform: translateY(-4px) scale(1.02);

      box-shadow:
        0 20px 40px rgba(107, 59, 232, 0.22);
    }

    .btn-custom:hover {
      transform: translateY(-3px);
      box-shadow: 0 22px 46px rgba(107, 59, 232, 0.14)
    }

    .btn-custom:active {
      transform: translateY(1px) scale(.995)
    }

    .btn-custom:focus {
      outline: none;
      box-shadow: 0 0 0 var(--focus);
    }

    @keyframes microPulse {
      0% {
        box-shadow: 0 10px 22px rgba(107, 59, 232, 0.09);
        transform: translateY(0)
      }

      50% {
        box-shadow: 0 22px 46px rgba(107, 59, 232, 0.14);
        transform: translateY(-4px)
      }

      100% {
        box-shadow: 0 10px 22px rgba(107, 59, 232, 0.09);
        transform: translateY(0)
      }
    }

    /* Controls row for sorts */
    .controls {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* Results container */
    .results-wrap {
      max-width: 1100px;
      margin: 24px auto 64px;
      padding: 0 12px;
    }

    .hotel-room {
      background: #fff;
      margin-bottom: 16px;
      border-radius: 12px;
      padding: 18px;
      display: flex;
      gap: 18px;
      align-items: center;
      box-shadow: 0 10px 26px rgba(20, 20, 30, 0.06);
      transition: transform .28s cubic-bezier(.2, .9, .25, 1), box-shadow .28s ease;
      transform: translateY(8px);
      opacity: 0;
    }

    .hotel-room.visible {
      transform: none;
      opacity: 1;
    }

    .hotel-room:hover {
      transform: translateY(-6px);
      box-shadow: 0 26px 60px rgba(30, 30, 60, 0.10);
    }

    .hotel-meta {
      flex: 1;
      min-width: 0;
    }

    .hotel-meta h4 {
      margin: 0 0 6px 0;
      font-weight: 700
    }

    .hotel-meta p {
      margin: 3px 0;
      color: var(--muted)
    }

    .price {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--accent);
    }

    .rating-badge {
      background: linear-gradient(90deg, #ffd54a, #ffb700);
      color: #333;
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 14px;
      font-weight: 700;
      display: inline-flex;
      gap: 6px;
      align-items: center;
    }

    .hotel-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-end;
      justify-content: center
    }

    .hotel-actions .btn {
      min-width: 120px;
    }

    /* Loading skeleton */
    .skeleton {
      height: 14px;
      background: linear-gradient(90deg, #eee, #f6f6f6, #eee);
      border-radius: 8px;
    }

    /* Footer */
    footer {
      background: linear-gradient(90deg, var(--pastel-peach), rgba(255, 255, 255, 0.9));
      padding: 22px 0;
      text-align: center;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
    }

    .controls {

      margin-top: 28px;

      display: flex;

      justify-content: center;

      align-items: center;

      gap: 16px;

      flex-wrap: wrap;
    }

    .loading-search {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
      padding: 10px;
    }

    .loading-search i {
      margin-right: 10px;
    }

    /* small screens */
    @media (max-width:768px) {
      .hero {
        height: 40vh;
        margin-top: 64px;
        border-radius: 0 0 14px 14px
      }

      .hotel-room {
        flex-direction: column;
        align-items: flex-start
      }

      .hotel-actions {
        align-items: flex-start;
        width: 100%
      }

      .search-bar {
        margin: -36px 12px 10px;
      }
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
      <a class="navbar-brand" href="/">AI Tour Planner</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-expanded="false"
        aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">

          <li class="nav-item">
            <a class="nav-link" href="/home">
              <i class="fas fa-house me-1"></i>
              Home
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="/sightseeing_suggestion">
              <i class="fas fa-location-dot me-1"></i>
              Locations
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link active" href="/hotel">
              <i class="fas fa-hotel me-1"></i>
              Hotels
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="/findmyway">
              <i class="fas fa-map-location-dot me-1"></i>
              Find My Way
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="/hotels_reviews">
              <i class="fas fa-star me-1"></i>
              Reviews
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="/routefinder">
              <i class="fas fa-route me-1"></i>
              Route Finder
            </a>
          </li>

        </ul>
      </div>
    </div>
  </nav>


  <!-- HERO -->
  <header class="hero" role="banner" aria-label="Find hotels hero">
    <div class="hero-shape s1" aria-hidden="true"></div>
    <div class="hero-shape s2" aria-hidden="true"></div>
    <h1>
      Find Your Dream Stay
      <i class="fas fa-hotel"></i>
    </h1>
  </header>

  <!-- SEARCH BAR -->
  <div class="search-bar" role="region" aria-labelledby="searchHeading">
    <h2 id="searchHeading" class="h5 mb-3 text-center">Search Hotels</h2>
    <div class="search-fields">

      <div class="search-input">
        <label class="visually-hidden" for="state">State</label>

        <input type="text" id="state" class="form-control" placeholder="State (e.g., Rajasthan)" aria-label="State">
      </div>

      <div class="search-input">
        <label class="visually-hidden" for="sightseeing">Place</label>

        <input type="text" id="sightseeing" class="form-control" placeholder="Sightseeing place (e.g., Jaipur)"
          aria-label="Sightseeing place">
      </div>

      <div class="search-input">
        <label class="visually-hidden" for="budget">Budget</label>

        <input type="number" id="budget" class="form-control" placeholder="Max budget (₹)" aria-label="Max budget">
      </div>

      <div class="search-btn-wrap">

        <button id="searchBtn" class="btn btn-custom" aria-label="Search hotels">
          <i class="fas fa-search"></i>
        </button>

      </div>

    </div>

    <div class="controls mt-3" aria-hidden="false">
      <button id="sortPriceBtn" class="btn btn-custom btn-sm" title="Sort results by price">Sort by Price</button>
      <button id="sortRatingBtn" class="btn btn-custom btn-sm" title="Sort results by rating">Sort by Rating</button>
      <button id="resetBtn" class="btn btn-outline-secondary btn-sm" title="Clear search">Reset</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="results-wrap" id="resultsWrap" aria-live="polite" aria-atomic="true">
    <div id="results" class="container px-0"></div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p class="mb-0">&copy; 2025 GNDEC | Designed by G13</p>
  </footer>

  <!-- bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>

  <script>
    // Utility: escape HTML (simple)
    function escapeHtml(str) {
      if (str === null || str === undefined) return '';
      return String(str).replace(/[&<>"'`=\/]/g, function (s) {
        return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;', '/': '&#x2F;', '`': '&#x60;', '=': '&#x3D;' })[s];
      });
    }

    // UI helpers
    const resultsDiv = document.getElementById('results');
    let hotelData = []; // store array of hotel objects

    // Small helpers for dates
    function isoToday() { return new Date().toISOString().slice(0, 10); }
    document.addEventListener('DOMContentLoaded', () => {


      // shrink navbar on scroll
      const nav = document.querySelector('.navbar');
      const shrinkPoint = 80;
      const onScroll = () => window.scrollY > shrinkPoint ? nav.classList.add('shrink') : nav.classList.remove('shrink');
      window.addEventListener('scroll', onScroll, { passive: true }); onScroll();

      // wire events
      document.getElementById('searchBtn').addEventListener('click', doSearch);
      document.getElementById('sortPriceBtn').addEventListener('click', sortByPrice);
      document.getElementById('sortRatingBtn').addEventListener('click', sortByRating);
      document.getElementById('resetBtn').addEventListener('click', resetForm);

      // Enter key in inputs triggers search
      ['state', 'sightseeing', 'budget'].forEach(id => {
        document.getElementById(id).addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); doSearch(); }
        });
      });
    });

    // Validate inputs
    function validateInputs() {
      const state = document.getElementById('state').value.trim();
      const place = document.getElementById('sightseeing').value.trim();
      const budgetStr = document.getElementById('budget').value.trim();

      if (!state) return { ok: false, message: 'Please enter State.' };
      if (!place) return { ok: false, message: 'Please enter a sightseeing place.' };

      // budget optional but if provided check numeric
      if (budgetStr && isNaN(Number(budgetStr))) return { ok: false, message: 'Budget must be a number.' };


      return { ok: true, state, place, budget: budgetStr ? Number(budgetStr) : null };
    }

    // show a temporary loading skeleton
    function showLoading() {
      resultsDiv.innerHTML = '';
      for (let i = 0; i < 3; i++) {
        const skeleton = document.createElement('div');
        skeleton.className = 'hotel-room visible';
        skeleton.innerHTML = `
          <div style="flex:1">
            <div class="skeleton" style="width:45%;height:18px;margin-bottom:8px"></div>
            <div class="skeleton" style="width:60%;height:12px;margin-bottom:8px"></div>
            <div class="skeleton" style="width:30%;height:12px"></div>
          </div>
          <div style="width:140px;display:flex;flex-direction:column;gap:8px;align-items:flex-end">
            <div class="skeleton" style="width:120px;height:34px;border-radius:8px"></div>
            <div class="skeleton" style="width:120px;height:34px;border-radius:8px"></div>
          </div>
        `;
        resultsDiv.appendChild(skeleton);
      }
    }

    // perform search (calls backend)
    async function doSearch() {
      const v = validateInputs();
      if (!v.ok) {
        // accessible alert
        resultsDiv.innerHTML =
          `<div class="p-3 text-center text-danger">
<strong>
<i class="fas fa-circle-exclamation me-2"></i>
${escapeHtml(v.message)}
</strong>
</div>`;
        return;
      }

      // show loading
      showLoading();

      try {
        const resp = await fetch('/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ state: v.state, sightseeing: v.place, max_budget: v.budget })
        });

        if (!resp.ok) {
          const json = await resp.json().catch(() => ({}));
          resultsDiv.innerHTML = `<div class="p-3 text-center text-danger">Error: ${escapeHtml(json.error || resp.statusText || 'Failed to fetch')}</div>`;
          return;
        }

        const data = await resp.json();
        // ensure array
        hotelData = Array.isArray(data) ? data : (data.hotels || []);
        displayHotels(hotelData);
      } catch (err) {
        console.error(err);
        resultsDiv.innerHTML = `<div class="p-3 text-center text-danger">An unexpected error occurred. Check console.</div>`;
      }
    }

    // render hotel list with staggered reveal
    function displayHotels(list) {
      resultsDiv.innerHTML = '';
      if (!list || list.length === 0) {
        resultsDiv.innerHTML = `<div class="p-3 text-center muted">No matching hotels found.</div>`;
        return;
      }

      list.forEach((hotel, idx) => {
        const card = document.createElement('div');
        card.className = 'hotel-room';
        // normalize keys (some backends may return different field names)
        const name = hotel['Hotel Name'] || hotel.name || hotel.title || 'Hotel';
        const rating = hotel['Ratings'] !== undefined ? hotel['Ratings'] : (hotel.rating || '—');
        const sight = hotel['Sightseeing Place'] || hotel.sightseeing || hotel.nearby || '';
        const budget = hotel['Budget'] !== undefined ? hotel['Budget'] : (hotel.price || '—');

        card.innerHTML = `
          <div class="hotel-meta">
            <h4><i class="fas fa-hotel" aria-hidden="true"></i> ${escapeHtml(name)}</h4>
            <p class="muted"><i class="fas fa-map-marker-alt" aria-hidden="true"></i> Nearby: ${escapeHtml(sight)}</p>
           
            <p class="price">₹${escapeHtml(budget)}</p>
          </div>
          <div class="hotel-actions">
            <span class="rating-badge" title="Rating"><i class="fas fa-star" aria-hidden="true"></i> ${escapeHtml(rating)}</span>
          </div>
        `;

        resultsDiv.appendChild(card);

        // stagger reveal for animation
        setTimeout(() => card.classList.add('visible'), 80 * idx);
      });

      // make results keyboard-focusable for accessibility
      resultsDiv.querySelectorAll('.hotel-room').forEach(r => r.setAttribute('tabindex', '0'));
    }

    // sorting helpers
    function sortByPrice() {
      if (!hotelData || !hotelData.length) return;
      const sorted = [...hotelData].sort((a, b) => {
        const pa = Number(a.Budget ?? a.price ?? Infinity);
        const pb = Number(b.Budget ?? b.price ?? Infinity);
        return pa - pb;
      });
      displayHotels(sorted);
    }

    function sortByRating() {
      if (!hotelData || !hotelData.length) return;
      const sorted = [...hotelData].sort((a, b) => {
        const ra = Number(a.Ratings ?? a.rating ?? 0);
        const rb = Number(b.Ratings ?? b.rating ?? 0);
        return rb - ra;
      });
      displayHotels(sorted);
    }

    function resetForm() {
      document.getElementById('state').value = '';
      document.getElementById('sightseeing').value = '';
      document.getElementById('budget').value = '';
      hotelData = [];
      resultsDiv.innerHTML = '';
      // reset min checkout
      document.getElementById('checkout').min = isoToday();
    }
  </script>
</body>

</html>
