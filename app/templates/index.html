<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title> Trip My Way</title>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}?v=2">
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='favicon.ico') }}">


  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">


  <style>
    :root {
      --primary: #7c3aed;
      --secondary: #4f46e5;

      --accent: #2155ff;
      --accent-2: #6b3be8;

      --light: #ffffff;
      --dark: #111827;
      --text: #1f2937;
      --muted: #6b7280;
      --glass: rgba(255, 255, 255, 0.18);
      --border: rgba(255, 255, 255, 0.2);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
      --radius: 28px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    body {
      font-family: "Poppins", sans-serif;
      overflow-x: hidden;
      background:
        radial-gradient(circle at top left, #dbeafe 0%, transparent 30%),
        radial-gradient(circle at bottom right, #f5d0fe 0%, transparent 30%),
        #f8fafc;
      color: var(--text);
    }

    /* SCROLLBAR */

    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg,
          var(--primary),
          #9d7cff);
      border-radius: 999px;
    }

    /* NAVBAR */

    .navbar {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      padding: 16px 0;
      transition: 0.4s ease;
      z-index: 999;
    }

    .navbar.shrink {
      padding: 10px 0;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .navbar-brand {
      font-size: 1.7rem;
      font-weight: 800;
      background: linear-gradient(90deg,
          var(--primary),
          var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-link {
      position: relative;
      font-weight: 500;
      color: var(--text) !important;
      margin: 0 4px;
      padding: 10px 16px !important;
      border-radius: 14px;
      transition: 0.3s ease;
    }

    .nav-link:hover {
      color: var(--primary) !important;
      background: rgba(124, 58, 237, 0.08);
      transform: translateY(-2px);
    }

    .nav-link.active {
      background: rgba(124, 58, 237, 0.1);
      color: var(--primary) !important;
      font-weight: 600;
    }

    .btn-primary {
      background: var(--primary);
      border-color: var(--primary);
      border-radius: 999px;
      font-weight: 700;
      padding: .85rem 1.3rem;
      box-shadow: 0 10px 24px rgba(108, 99, 255, .25);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
    }

    .btn-outline-dark {
      border-radius: 999px;
      padding: .85rem 1.3rem;
      font-weight: 700;
    }

    .hero {
      padding: 7rem 0 4rem;
    }

    .hero-card {
      background: var(--glass-bg);
      border-radius: var(--radius);
      padding: 3rem 3.5rem;
      max-width: 980px;
      margin: auto;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .hero h1 {
      font-size: clamp(2rem, 3.8vw + 1rem, 3.2rem);
      font-weight: 800;
      margin-bottom: 1rem;
    }

    .hero p {
      color: var(--muted);
      max-width: 780px;
      margin: 0 auto 1.8rem;
      font-size: 1.05rem;
    }

    .why {
      padding: 4rem 0;
      text-align: center;
    }

    .why h2 {
      font-size: 2rem;
      font-weight: 700;
    }

    .logo-img {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 12px;
      background: white;
      padding: 4px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/">

        <img src="/static/images/tour-ps-logo.png" alt="Logo" class="logo-img">

        <span>TRIP MY WAY</span>

      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>
  </nav>

  <!-- Hero Section -->
  <header class="hero">
    <div class="container">
      <div class="hero-card">
        <h1>Travel Your Dream Destination <i class="bi bi-airplane-fill"></i></h1>
        <p>
          Pastel-inspired planning — calm, delightful, and easy.
          Our AI crafts day-wise itineraries, budget-friendly options, and local tips.
        </p>

        <div class="d-flex flex-wrap justify-content-center gap-3">

          <!-- Login button -->
          <button id="loginBtn" class="btn btn-outline-dark">Login Here</button>
        </div>
      </div>
    </div>
  </header>

  <!-- Section below hero -->
  <section class="why">
    <div class="container">

    </div>
  </section>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Login Redirect Script -->
  <script>
    document.getElementById('loginBtn').addEventListener('click', function () {
      window.location.href = "{{ url_for('auth.login') }}";  // ✅ CORRECT Flask route
    });
  </script>

</body>

</html>
