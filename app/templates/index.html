<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Tour Planner</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="icon" href="data:,">

  <style>
    :root {
      --brand: #111827;
      --muted: #667085;
      --primary: #6C63FF;
      --primary-dark: #5a52e6;
      --glass-bg: #ffffff;
      --shadow: 0 20px 60px rgba(17, 24, 39, .18), 0 8px 24px rgba(17, 24, 39, .08);
      --radius: 28px;
    }

    body {
      font-family: "Poppins", sans-serif;
      color: var(--brand);
      background: radial-gradient(1400px 900px at 80% 10%, #f3f7ff 0%, #f2f5ff 25%, rgba(240, 248, 255, .6) 40%, transparent 60%),
        radial-gradient(1200px 800px at 10% 20%, #ffeef5 0%, #ffeff7 35%, rgba(255, 239, 247, .35) 55%, transparent 70%),
        radial-gradient(1100px 900px at 30% 80%, #eafaf2 0%, #edfbf4 35%, rgba(234, 250, 242, .38) 55%, transparent 70%),
        linear-gradient(135deg, #f7e7ff 0%, #e7f6ff 50%, #fff6ea 100%);
      min-height: 100vh;
    }

    .navbar-nav {
      align-items: center;
    }

    #profileMenu {
      display: flex;
      align-items: center;
      gap: 10px;
    }


    .navbar {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);

      border-bottom: 1px solid rgba(255, 255, 255, 0.35);

      padding: 0.55rem 1.2rem;
      transition:
        all 0.35s ease;

      z-index: 999;

      box-shadow:
        0 8px 30px rgba(0, 0, 0, 0.05);
    }

    .btn-primary {
      background: var(--primary);
      border-color: var(--primary);
      border-radius: 999px;
      font-weight: 700;
      padding: .85rem 1.3rem;
      box-shadow: 0 10px 24px rgba(108, 99, 255, .25);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
    }

    .btn-outline-dark {
      border-radius: 999px;
      padding: .85rem 1.3rem;
      font-weight: 700;
    }

    .hero {
      padding: 7rem 0 4rem;
    }

    .hero-card {
      background: var(--glass-bg);
      border-radius: var(--radius);
      padding: 3rem 3.5rem;
      max-width: 980px;
      margin: auto;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .hero h1 {
      font-size: clamp(2rem, 3.8vw + 1rem, 3.2rem);
      font-weight: 800;
      margin-bottom: 1rem;
    }

    .hero p {
      color: var(--muted);
      max-width: 780px;
      margin: 0 auto 1.8rem;
      font-size: 1.05rem;
    }

    .why {
      padding: 4rem 0;
      text-align: center;
    }

    .why h2 {
      font-size: 2rem;
      font-weight: 700;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{{ url_for('trip.home_page') }}">
        AI Tour Planner
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div id="nav" class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('trip.home_page') }}">Home</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <header class="hero">
    <div class="container">
      <div class="hero-card">
        <h1>Travel Your Dream Destination <i class="bi bi-airplane-fill"></i></h1>
        <p>
          Pastel-inspired planning — calm, delightful, and easy.
          Our AI crafts day-wise itineraries, budget-friendly options, and local tips.
        </p>

        <div class="d-flex flex-wrap justify-content-center gap-3">

          <!-- Login button -->
          <button id="loginBtn" class="btn btn-outline-dark">Login Here</button>
        </div>
      </div>
    </div>
  </header>

  <!-- Section below hero -->
  <section class="why">
    <div class="container">

    </div>
  </section>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Login Redirect Script -->
  <script>
    document.getElementById('loginBtn').addEventListener('click', function () {
      window.location.href = "{{ url_for('auth.login') }}";  // ✅ CORRECT Flask route
    });
  </script>

</body>

</html>
