<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Route Finder</title>

  <!-- Google Font (same as main) -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- Bootstrap (same as main) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* ====== Pastel theme (aligned with main index) ====== */
    :root {
      --bg: #fffaf8;
      --surface: #ffffff;
      --pastel-sky: #c2e2f4;
      --pastel-mint: #cdeee6;
      --pastel-peach: #f7d4bf;
      --pastel-lav: #e0c6f2;
      --pastel-sand: #ffe8c9;
      --accent: #6b3be8;
      --text: #253238;
      --muted: #606366;
      --radius: 14px;
      --card-shadow: 0 18px 40px rgba(35, 35, 55, 0.10);
      --glass: rgba(255, 255, 255, 0.88);
      --focus: 3px rgba(107, 59, 232, 0.18);
      --navbar-height: 86px;
      /* used to offset content */
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: "Poppins", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: linear-gradient(180deg, var(--pastel-sky) 0%, var(--bg) 62%);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* PREFERS REDUCED MOTION */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition: none !important;
      }
    }

    /* ===== Navbar - styled to match main frontend ===== */
    .navbar {
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.72));
      padding: 1.05rem 1rem;
      transition: padding .28s ease, box-shadow .28s ease, backdrop-filter .28s ease;
      z-index: 60;
      backdrop-filter: blur(6px);
    }

    .navbar .navbar-brand {
      font-weight: 800;
      font-size: 1.35rem;

      background: linear-gradient(90deg,
          #6b3be8,
          #8b5cf6);

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      letter-spacing: 0.3px;

      transition: 0.3s ease;
    }

    .nav-link {
      color: var(--text) !important;

      font-weight: 500;
      font-size: 0.95rem;

      padding:
        0.65rem 1rem !important;

      border-radius: 12px;

      transition:
        all 0.3s ease;

      position: relative;
    }

    .nav-link:hover {
      color: var(--accent) !important;

      background:
        rgba(107, 59, 232, 0.08);

      transform:
        translateY(-2px);
    }

    .nav-link.active {

      background:
        rgba(107, 59, 232, 0.10);

      color:
        var(--accent) !important;

      border-radius: 12px;

      font-weight: 600;
    }

    .nav-link i {
      font-size: 0.9rem;
      margin-right: 6px;
      vertical-align: middle;
    }

    .nav-link {
      white-space: nowrap;
    }

    .navbar.shrink {
      padding: .46rem 1rem;
      box-shadow: 0 12px 28px rgba(20, 20, 30, 0.07);
      backdrop-filter: blur(8px);
    }

    .nav-link:focus {
      outline: none;
      box-shadow: 0 0 0 var(--focus);
      border-radius: 6px;
    }



    /* ===== Page layout adjustments (preserve your original spacing but align with taller navbar) ===== */
    /* keep your slim container margin but offset for new navbar height */
    .container-root {
      max-width: 960px;
      margin: calc(var(--navbar-height) + 14px) auto 20px auto;
      /* push down below navbar */
      padding: 20px;
    }

    /* Card styles — keep your original look but update to pastel cards + shadows */
    .card {
      background: var(--surface);
      border-radius: 12px;
      box-shadow: var(--card-shadow);
      padding: 20px;
      margin-bottom: 20px;
    }

    /* typography */
    h3,
    h4,
    h5 {
      color: var(--text);
      margin-top: 0
    }

    label {
      font-weight: 600;
      color: var(--text)
    }

    /* form elements (preserve original classes/IDs and behavior) */
    input[type="text"] {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #e6e6e6;
      margin-bottom: 10px;
      font-size: 14px;
      background: linear-gradient(180deg, #fff, #fbfaf9);
    }

    button {
      background: linear-gradient(90deg, var(--accent), #8a6cff);
      color: #fff;
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: transform .18s ease, box-shadow .18s ease;
      width: 100%;
      box-shadow: 0 12px 30px rgba(107, 59, 232, 0.12);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 48px rgba(107, 59, 232, 0.16);
    }

    /* table */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    th,
    td {
      padding: 10px;
      border-bottom: 1px solid #f0f0f0;
      color: var(--text)
    }

    .mode-pill {
      background: rgba(194, 226, 244, 0.55);
      padding: 6px 8px;
      border-radius: 8px;
      font-size: 13px;
    }

    /* weather */
    #weatherBox {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), #f6f8ff);
      font-size: 14px;
    }

    /* small helpers */
    .muted {
      color: var(--muted)
    }

    .mb-1-5 {
      margin-bottom: 1.5rem
    }

    /* footer (copied from main) */
    footer {
      padding: 28px 0;
      background: linear-gradient(90deg, var(--pastel-sand), rgba(255, 255, 255, 0.9));
      color: var(--text);
      margin-top: 18px;
    }

    footer a {
      color: var(--text);
      text-decoration: none;
    }

    footer hr {
      border-color: rgba(0, 0, 0, 0.06)
    }

    /* responsive */
    @media (max-width:768px) {
      .container-root {
        margin-top: calc(var(--navbar-height) + 8px);
        padding: 14px;
      }

      .navbar {
        padding: .56rem 0.8rem
      }
    }
  </style>
</head>

<body>

  <!-- NAVBAR: switched to same structure & links as your main frontend (keeps active class on Route Finder) -->
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
      <a class="navbar-brand" href="/"> Trip My Way </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-expanded="false"
        aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">

          <li class="nav-item">
            <a class="nav-link" href="/home">
              <i class="fas fa-house me-1"></i>
              Home
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="/sightseeing_suggestion">
              <i class="fas fa-location-dot me-1"></i>
              Locations
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="/hotel">
              <i class="fas fa-hotel me-1"></i>
              Hotels
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="/findmyway">
              <i class="fas fa-map-location-dot me-1"></i>
              Find My Way
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="/hotels_reviews">
              <i class="fas fa-star me-1"></i>
              Reviews
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link active" href="/routefinder">
              <i class="fas fa-route me-1"></i>
              Route Finder
            </a>
          </li>

          <!-- PROFILE -->

        </ul>
      </div>
    </div>
  </nav>
  <!-- Main content: I preserved all your original ids, inputs, button and script logic -->
  <div class="container-root">
    <div class="card">
      <h3 class="mb-3">Find Best Route & Weather</h3>
      <label for="src">Source</label>
      <input id="src" type="text" placeholder="Enter source (e.g. 'Delhi, India')">
      <label for="dst">Destination</label>
      <input id="dst" type="text" placeholder="Enter destination (e.g. 'Jaipur, India')">
      <button id="goBtn">Get Options</button>
      <div id="status" class="mt-2 text-muted">Enter details & click <strong>Get Options</strong>.</div>
    </div>

    <div id="resultWrap" class="card" style="display:none">
      <h4>Results</h4>
      <div id="summary" class="text-muted"></div>

      <h5 class="mt-3">Transport Modes</h5>
      <table id="modesTable">
        <thead>
          <tr>
            <th>Mode</th>
            <th>Distance (km)</th>
            <th>Duration (hrs)</th>
            <th>Fare (₹)</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

      <h5 class="mt-3">Weather at Destination</h5>
      <div id="weatherBox"></div>
    </div>
  </div>

  <!-- Footer copied from main: matches site look & feel -->
  <footer>
    <div class="container text-center">
      <div class="row">

        <hr>
        <p> 2026 GNDEC | All Rights Reserved</p>
      </div>
  </footer>

  <!-- Bootstrap bundle (same as main) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>

  <!-- Original script preserved exactly (only small enhancement: auto-close navbar on link click on mobile) -->
  <script>
    const goBtn = document.getElementById("goBtn");
    const status = document.getElementById("status");
    const resultWrap = document.getElementById("resultWrap");
    const modesTableBody = document.querySelector("#modesTable tbody");
    const summary = document.getElementById("summary");
    const weatherBox = document.getElementById("weatherBox");

    async function queryRoutes() {

      const src = document.getElementById("src").value.trim();

      const dst = document.getElementById("dst").value.trim();

      if (!src || !dst) {

        status.textContent =
          "Please enter both source and destination.";

        return;
      }

      goBtn.disabled = true;

      goBtn.innerText = "Loading...";

      status.textContent = "Fetching routes...";

      resultWrap.style.display = "none";

      modesTableBody.innerHTML = "";

      weatherBox.innerHTML = "";

      try {

        const API_BASE =
          "https://tour-ps.onrender.com/";

        const res = await fetch(
          `${API_BASE}/api/route?start=${encodeURIComponent(src)}&destination=${encodeURIComponent(dst)}`
        );

        const data = await res.json();

        console.log("ROUTE RESPONSE:");
        console.log(data);

        if (!res.ok || !data.success) {

          status.textContent =
            data.error || "Error from server";

          goBtn.disabled = false;

          goBtn.innerText = "Get Options";

          return;
        }

        status.textContent = "Done.";

        resultWrap.style.display = "block";

        summary.innerHTML = `

      <strong>From:</strong>
      ${data.source.address}

      <br>

      <strong>To:</strong>
      ${data.destination.address}

    `;

        modesTableBody.innerHTML = "";

        (data.modes || []).forEach(m => {

          const tr = document.createElement("tr");

          tr.innerHTML = `

        <td>
          <span class="mode-pill">
            ${m.label}
          </span>
        </td>

        <td>
          ${m.distance_km != null
              ? m.distance_km.toFixed(2)
              : "—"}
        </td>

        <td>
          ${m.duration_hr != null
              ? m.duration_hr.toFixed(2) + " hrs"
              : "—"}
        </td>

        <td>
          ${m.estimated_fare_inr != null
              ? "₹ " + m.estimated_fare_inr
              : "—"}
        </td>

      `;

          modesTableBody.appendChild(tr);

        });

        if (data.weather_at_destination) {

          const w = data.weather_at_destination;

          weatherBox.innerHTML = `

        <div>

          Temp:
          ${w.temperature_c} °C

          <br>

          Condition:
          ${w.description}

          <br>

          Wind:
          ${w.windspeed_m_s} m/s

        </div>

      `;
        }

        goBtn.disabled = false;

        goBtn.innerText = "Get Options";

      }

      catch (err) {

        console.error(err);

        status.textContent =
          "Network/server error";

        goBtn.disabled = false;

        goBtn.innerText = "Get Options";
      }
    }

    goBtn.addEventListener("click", queryRoutes);

    // Small enhancement: close mobile nav when a link is clicked (keeps UX consistent with main)
    document.querySelectorAll('.navbar-collapse .nav-link').forEach(link => {
      link.addEventListener('click', () => {
        const collapse = document.querySelector('.navbar-collapse');
        if (collapse && collapse.classList.contains('show')) {
          const bsCollapse = bootstrap.Collapse.getOrCreateInstance(collapse);
          bsCollapse.hide();
        }
      });
    });

    // Shrink navbar on scroll to match main behavior
    (function () {
      const nav = document.querySelector('.navbar');
      const shrinkPoint = 80;
      const onScroll = () => { window.scrollY > shrinkPoint ? nav.classList.add('shrink') : nav.classList.remove('shrink') };
      window.addEventListener('scroll', onScroll, { passive: true }); onScroll();
    })();
  </script>
</body>

</html>
