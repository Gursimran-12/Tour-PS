<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sightseeing Suggestion | AI Tour Planner</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- FontAwesome -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous" defer></script>


  <style>
    :root {
      --bg: #fffaf8;
      --pastel-sky: #c2e2f4;
      --pastel-peach: #f7d4bf;
      --accent: #6b3be8;
      --muted: #606366;
      --text: #253238;
      --card-shadow: 0 18px 40px rgba(35, 35, 55, 0.08);
      --glass: rgba(255, 255, 255, 0.92);
      --radius: 14px;
      --focus: 3px rgba(107, 59, 232, 0.14);
    }

    html,
    body {
      height: 100%
    }

    body {
      margin: 0;
      font-family: "Poppins", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: linear-gradient(180deg, var(--pastel-sky) 0%, var(--bg) 68%);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition: none !important;
      }
    }

    /* Navbar - matches main */
    /* ===== Navbar - styled to match main frontend ===== */
    .navbar {
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.72));
      padding: 1.05rem 1rem;
      transition: padding .28s ease, box-shadow .28s ease, backdrop-filter .28s ease;
      z-index: 60;
      backdrop-filter: blur(6px);
    }

    .navbar .navbar-brand {
      font-weight: 800;
      font-size: 1.35rem;

      background: linear-gradient(90deg,
          #6b3be8,
          #8b5cf6);

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      letter-spacing: 0.3px;

      transition: 0.3s ease;
    }

    .nav-link {
      color: var(--text) !important;

      font-weight: 500;
      font-size: 0.95rem;

      padding:
        0.65rem 1rem !important;

      border-radius: 12px;

      transition:
        all 0.3s ease;

      position: relative;
    }

    .nav-link:hover {
      color: var(--accent) !important;

      background:
        rgba(107, 59, 232, 0.08);

      transform:
        translateY(-2px);
    }

    .nav-link.active {

      background:
        rgba(107, 59, 232, 0.10);

      color:
        var(--accent) !important;

      border-radius: 12px;

      font-weight: 600;
    }

    .nav-link i {
      font-size: 0.9rem;
      margin-right: 6px;
      vertical-align: middle;
    }

    .nav-link {
      white-space: nowrap;
    }

    .navbar.shrink {
      padding: .46rem 1rem;
      box-shadow: 0 12px 28px rgba(20, 20, 30, 0.07);
      backdrop-filter: blur(8px);
    }

    .nav-link:focus {
      outline: none;
      box-shadow: 0 0 0 var(--focus);
      border-radius: 6px;
    }


    /* Hero */
    .header-image {
      position: relative;
      background: linear-gradient(120deg, rgba(231, 180, 142, 0.92), rgba(194, 226, 244, 0.88)), url('/static/images1/T2.jpg') center/cover no-repeat;
      height: 44vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: clamp(1.6rem, 2.8vw, 2.4rem);
      font-weight: 800;
      text-align: center;
      border-radius: 0 0 28px 28px;
      margin-top: 72px;
      box-shadow: var(--card-shadow);
      overflow: hidden;
    }

    .header-image::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.06), rgba(0, 0, 0, 0.14));
    }

    .header-image h1 {
      position: relative;
      z-index: 2;
      margin: 0;
      letter-spacing: -0.4px;
    }

    /* floating subtle shapes (aria-hidden) */
    .hero-shape {
      position: absolute;
      border-radius: 50%;
      opacity: .36;
      filter: blur(10px);
      mix-blend-mode: screen;
      z-index: 1;
    }

    .hero-shape.s1 {
      width: 260px;
      height: 260px;
      left: -40px;
      top: 6%;
      background: rgba(205, 238, 230, 0.9);
      animation: floatY 9s ease-in-out infinite;
    }

    .hero-shape.s2 {
      width: 200px;
      height: 200px;
      right: -40px;
      top: 12%;
      background: rgba(224, 198, 242, 0.9);
      animation: floatY 11s ease-in-out infinite;
    }

    @keyframes floatY {
      0% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-10px)
      }

      100% {
        transform: translateY(0)
      }
    }

    /* Gallery */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 40px 28px;
      max-width: 1180px;
      margin: 0 auto;
      transform: translateZ(0);
    }

    .gallery .thumb {
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      background: var(--glass);
      transition: transform .36s cubic-bezier(.2, .9, .25, 1), box-shadow .36s ease, filter .36s;
      will-change: transform;
    }

    .gallery img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      transition: transform .6s ease, opacity .4s ease;
    }

    .thumb:hover {
      transform: translateY(-10px) scale(1.01);
      box-shadow: 0 30px 70px rgba(35, 35, 60, 0.12);
    }

    .thumb:focus-within {
      box-shadow: 0 18px 46px rgba(107, 59, 232, 0.08);
      outline: none;
    }

    /* Main search container (glass card) */
    .main-container {
      max-width: 980px;
      margin: -48px auto 36px;
      background: var(--glass);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(30, 30, 50, 0.08);
      position: relative;
      z-index: 50;
      transition: transform .28s ease, box-shadow .28s ease;
    }

    .form-control.rounded-pill {
      border-radius: 999px;
      padding: 14px 20px;
      box-shadow: 0 6px 18px rgba(40, 40, 60, 0.04);
      transition: box-shadow .18s ease, transform .18s ease;
    }

    .form-control.rounded-pill:focus {
      box-shadow: 0 10px 30px rgba(107, 59, 232, 0.08);
      outline: none;
      border-color: rgba(107, 59, 232, 0.12);
    }

    /* Search button microPulse */
    .btn-custom {
      background: linear-gradient(90deg, var(--accent), #8a6cff);
      color: #fff;
      border: none;
      font-weight: 700;
      border-radius: 999px;
      padding: 12px 26px;
      box-shadow: 0 12px 30px rgba(107, 59, 232, 0.12);
      transition: transform .18s ease, box-shadow .18s ease;
      animation: microPulse 3.6s ease-in-out infinite;
    }

    .btn-custom:active {
      transform: translateY(1px) scale(.995)
    }

    .btn-custom:focus {
      outline: none;
      box-shadow: 0 0 0 var(--focus);
    }

    @keyframes microPulse {
      0% {
        box-shadow: 0 10px 22px rgba(107, 59, 232, 0.09);
        transform: translateY(0)
      }

      50% {
        box-shadow: 0 22px 46px rgba(107, 59, 232, 0.14);
        transform: translateY(-4px)
      }

      100% {
        box-shadow: 0 10px 22px rgba(107, 59, 232, 0.09);
        transform: translateY(0)
      }
    }

    /* Result cards animated entry */
    .results {
      margin-top: 20px;
    }

    .result-card {
      background: #fff;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 14px;
      box-shadow: 0 6px 22px rgba(20, 20, 30, 0.06);
      transform: translateY(8px);
      opacity: 0;
      transition: transform .44s cubic-bezier(.2, .9, .25, 1), opacity .44s ease;
    }

    .result-card.visible {
      transform: none;
      opacity: 1;
    }

    .result-card strong {
      font-size: 1.05rem;
      color: var(--text)
    }

    /* small helpers */
    .muted {
      color: var(--muted)
    }

    footer {
      background: linear-gradient(90deg, var(--pastel-peach), rgba(255, 255, 255, 0.9));
      padding: 28px 0;
      margin-top: 36px;
      text-align: center;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
    }


    .place-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .place-icon {
      color: #ff5a36;
      font-size: 1rem;
    }

    /* responsive tweaks */
    @media (max-width:768px) {
      .header-image {
        height: 34vh;
        margin-top: 64px;
        border-radius: 0 0 18px 18px
      }

      .gallery img {
        height: 140px
      }

      .main-container {
        margin: -36px 16px 24px
      }

      .hero-shape {
        display: none
      }
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
      <a class="navbar-brand" href="/">AI Tour Planner</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-expanded="false"
        aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">

          <li class="nav-item">
            <a class="nav-link" href="/home">
              <i class="fas fa-house me-1"></i>
              Home
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link active" href="/sightseeing_suggestion">
              <i class="fas fa-location-dot me-1"></i>
              Locations
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="/hotel">
              <i class="fas fa-hotel me-1"></i>
              Hotels
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="/findmyway">
              <i class="fas fa-map-location-dot me-1"></i>
              Find My Way
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="/hotels_reviews">
              <i class="fas fa-star me-1"></i>
              Reviews
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="/routefinder">
              <i class="fas fa-route me-1"></i>
              Route Finder
            </a>
          </li>

        </ul>
      </div>
    </div>
  </nav>
  <!-- HERO -->
  <header class="header-image" role="banner" aria-label="Plan your trip hero">
    <div class="hero-shape s1" aria-hidden="true"></div>
    <div class="hero-shape s2" aria-hidden="true"></div>
    <h1>
      Discover Must-Visit Places
      <i class="fas fa-earth-asia"></i>
    </h1>
  </header>

  <!-- Main search panel (floating) -->
  <main>
    <div class="main-container shadow-sm" role="region" aria-labelledby="findHeading">
      <h2 id="findHeading" class="mb-3 text-center">Find Sightseeing Places</h2>

      <div class="row g-3 align-items-center justify-content-center">
        <div class="col-md-5">
          <input type="text" id="stateSelect" class="form-control rounded-pill"
            placeholder="Enter State (e.g., Rajasthan, Kerala)" aria-label="State" />
        </div>
        <div class="col-md-5">
          <input type="text" id="categorySelect" class="form-control rounded-pill"
            placeholder="Enter Category (Historical, Religious, Leisure)" aria-label="Category" />
        </div>
        <div class="col-md-2 text-center">
          <button id="searchBtn" class="btn btn-custom w-100" aria-label="Search places"><i class="fas fa-search"
              aria-hidden="true"></i>&nbsp;Search</button>
        </div>
      </div>

      <div class="results mt-4" id="resultsSection" aria-live="polite">
        <h3 class="text-center mb-3 muted">Suggestions:</h3>
        <div id="results" class="px-2"></div>
      </div>
    </div>

    <!-- Gallery -->
    <section class="gallery" aria-label="Gallery of images">
      <div class="thumb" tabindex="0"><img src="/static/images/L101.jpg" alt="Adventure"></div>
      <div class="thumb" tabindex="0"><img src="/static/images/L1.jpg" alt="Luxury Hotel"></div>
      <div class="thumb" tabindex="0"><img src="/static/images/L102.jpg" alt="Historical"></div>
      <div class="thumb" tabindex="0"><img src="/static/images/L103.jpg" alt="Beach Fun"></div>
      <div class="thumb" tabindex="0"><img src="/static/images/L104.jpg" alt="Mountains"></div>
      <div class="thumb" tabindex="0"><img src="/static/images/L105.jpg" alt="Cultural"></div>
      <div class="thumb" tabindex="0"><img src="/static/images/L106.jpg" alt="Nature"></div>
      <div class="thumb" tabindex="0"><img src="/static/images/L107.jpg" alt="Waterfall"></div>

    </section>
  </main>

  <!-- PLACE TYPE MODAL -->
  <div class="modal fade" id="placeTypeModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg rounded-4">

        <div class="modal-header border-0">
          <h5 class="modal-title fw-bold">
            <i class="fas fa-map-marked-alt me-2"></i>
            What would you like to see?
          </h5>

          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body text-center pb-4">

          <button id="famousPlacesBtn" class="btn btn-lg btn-custom w-100 mb-3">

            <i class="fas fa-star me-2"></i>
            Only Famous Places

          </button>

          <button id="allPlacesBtn" class="btn btn-outline-dark btn-lg w-100 rounded-pill">

            <i class="fas fa-globe me-2"></i>
            All Places

          </button>

        </div>
      </div>
    </div>
  </div>
  <!-- Footer -->
  <footer>
    <p class="mb-0">&copy; 2025 GNDEC | Designed by G13</p>
  </footer>

  <!-- Bootstrap bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>

  <script>
    // Shrink navbar on scroll
    (function () {

      const nav = document.querySelector('.navbar');
      const shrinkPoint = 80;

      const onScroll = () => {

        window.scrollY > shrinkPoint
          ? nav.classList.add('shrink')
          : nav.classList.remove('shrink');

      };

      window.addEventListener('scroll', onScroll, { passive: true });

      onScroll();

      // Intersection Observer Animation
      const observerOpts = { threshold: 0.12 };

      if ('IntersectionObserver' in window) {

        const thumbItems = document.querySelectorAll('.thumb');

        const obsThumb = new IntersectionObserver((entries, o) => {

          entries.forEach(e => {

            if (e.isIntersecting) {

              e.target.style.transform = 'none';
              e.target.style.opacity = 1;

              o.unobserve(e.target);

            }

          });

        }, observerOpts);

        thumbItems.forEach(t => {

          t.style.opacity = 0;
          t.style.transform = 'translateY(12px)';
          t.style.transition =
            'opacity .6s ease, transform .6s cubic-bezier(.2,.9,.25,1)';

          obsThumb.observe(t);

        });

      } else {

        document.querySelectorAll('.thumb').forEach(t => {

          t.style.opacity = 1;
          t.style.transform = 'none';

        });

      }

      // Hero parallax
      const hero = document.querySelector('.header-image');

      if (
        hero &&
        !window.matchMedia('(prefers-reduced-motion: reduce)').matches
      ) {

        window.addEventListener('mousemove', (e) => {

          const pctX = (e.clientX / window.innerWidth) - 0.5;
          const pctY = (e.clientY / window.innerHeight) - 0.5;

          hero.style.transform =
            `translate3d(${pctX * 6}px, ${pctY * 4}px, 0)`;

          clearTimeout(hero._t);

          hero._t = setTimeout(() => {

            hero.style.transform = '';

          }, 120);

        }, { passive: true });

      }

    })();

    // Escape HTML
    function escapeHtml(str) {

      if (!str && str !== 0) return '';

      return String(str).replace(/[&<>"'`=\/]/g, function (s) {

        return {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;',
          '/': '&#x2F;',
          '`': '&#x60;',
          '=': '&#x3D;'
        }[s];

      });

    }

    // Check invalid names
    function isValidPlaceName(name) {

      if (!name) return false;

      const cleaned = name.trim().toLowerCase();

      const invalidWords = [
        'unknown',
        'unnamed',
        'null',
        'undefined',
        'n/a',
        'na',
        '-'
      ];

      // Remove invalid keywords
      if (invalidWords.includes(cleaned)) return false;

      // Remove very short names
      if (cleaned.length < 3) return false;

      // Remove numeric-only names
      if (/^[0-9\s]+$/.test(cleaned)) return false;

      return true;

    }

    // Famous place checker
    function isFamousPlace(place) {

      const text = (
        (place.name || '') +
        ' ' +
        (place.category || '') +
        ' ' +
        (place.kinds || '')
      ).toLowerCase();

      const famousKeywords = [

        'tourism',
        'tourist',
        'heritage',
        'unesco',
        'museum',
        'monument',
        'temple',
        'fort',
        'palace',
        'historical',
        'history',
        'famous',
        'landmark',
        'national park',
        'wildlife',
        'sanctuary',
        'religious',
        'cathedral',
        'mosque',
        'church',
        'lake',
        'waterfall',
        'hill station',
        'beach',
        'garden',
        'park'

      ];

      return famousKeywords.some(keyword =>
        text.includes(keyword)
      );

    }

    // Remove duplicates
    function removeDuplicatePlaces(places) {

      const seen = new Set();

      return places.filter(place => {

        const key = (place.name || '')
          .trim()
          .toLowerCase();

        if (seen.has(key)) {

          return false;

        }

        seen.add(key);

        return true;

      });

    }

    async function findPlacesGeo() {

      const state =
        document.getElementById("stateSelect").value.trim();

      const category =
        document.getElementById("categorySelect").value.trim();

      const resultsDiv =
        document.getElementById("results");

      resultsDiv.innerHTML = "";

      if (!state || !category) {

        resultsDiv.innerHTML = `
        <p class='text-center text-danger'>
          <i class='fas fa-triangle-exclamation me-2'></i>
          Please enter both state and category.
        </p>
      `;

        return;

      }

      // Loading
      resultsDiv.innerHTML = `
      <p class='text-center muted'>
        <i class='fas fa-spinner fa-spin me-2'></i>
        Searching famous sightseeing places...
      </p>
    `;

      try {

        const resp = await fetch("/suggest_geo", {

          method: "POST",

          headers: {
            "Content-Type": "application/json"
          },

          body: JSON.stringify({
            state,
            category
          })

        });

        const json = await resp.json();

        if (!resp.ok) {

          resultsDiv.innerHTML = `
          <p class='text-center text-danger'>
            Error: ${json.error || 'Failed to fetch'}
          </p>
        `;

          return;

        }

        let places = json.places || [];

        // Remove invalid names
        places = places.filter(place =>
          isValidPlaceName(place.name)
        );

        // Remove duplicates
        places = removeDuplicatePlaces(places);

        // Famous mode
        if (selectedPlaceMode === "famous") {

          places = places.filter(place =>
            isFamousPlace(place)
          );

        }

        // Sort by distance if available
        places.sort((a, b) => {

          const d1 = a.distance_km || 99999;
          const d2 = b.distance_km || 99999;

          return d1 - d2;

        });

        // No results
        if (!places.length) {

          resultsDiv.innerHTML = `
          <p class='text-center muted'>
            No proper sightseeing places found.
          </p>
        `;

          return;

        }

        resultsDiv.innerHTML = "";

        places.forEach((p, idx) => {

          const card = document.createElement('div');

          card.className = 'result-card';

          card.innerHTML = `

          <div class="place-title">

            <i class="fas fa-map-marker-alt place-icon"></i>

            <strong>${escapeHtml(p.name)}</strong>

          </div>

          <em class="muted">

            <i class="fas fa-layer-group me-1"></i>

            ${escapeHtml(
            p.category ||
            p.kinds ||
            'Tourist Attraction'
          )}

          </em><br>

          ${p.address ? `
            <small>
              <i class="fas fa-location-dot me-1"></i>
              ${escapeHtml(p.address)}
            </small><br>
          ` : ''}

          ${p.distance_km !== undefined ? `
            <small>
              <i class="fas fa-route me-1"></i>
              Distance:
              ${Number(p.distance_km).toFixed(2)} km
            </small>
          ` : ''}

        `;

          resultsDiv.appendChild(card);

          setTimeout(() => {

            card.classList.add('visible');

          }, 80 * idx);

        });

      } catch (err) {

        console.error(err);

        resultsDiv.innerHTML = `
        <p class='text-center text-danger'>
          An unexpected error occurred.
        </p>
      `;

      }

    }

    let selectedPlaceMode = "all";

    document
      .getElementById("searchBtn")
      .addEventListener("click", () => {

        const modal = new bootstrap.Modal(
          document.getElementById("placeTypeModal")
        );

        modal.show();

      });

    document
      .getElementById("famousPlacesBtn")
      .addEventListener("click", () => {

        selectedPlaceMode = "famous";

        bootstrap.Modal
          .getInstance(
            document.getElementById("placeTypeModal")
          )
          .hide();

        findPlacesGeo();

      });

    document
      .getElementById("allPlacesBtn")
      .addEventListener("click", () => {

        selectedPlaceMode = "all";

        bootstrap.Modal
          .getInstance(
            document.getElementById("placeTypeModal")
          )
          .hide();

        findPlacesGeo();

      });

    // Enter key support
    ['stateSelect', 'categorySelect'].forEach(id => {

      document
        .getElementById(id)
        .addEventListener("keydown", function (e) {

          if (e.key === "Enter") {

            e.preventDefault();

            findPlacesGeo();

          }

        });

    });

  </script>
</body>

</html>
