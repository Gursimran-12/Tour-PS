<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Trip My Way </title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}?v=2">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='favicon.ico') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --bg: #fffaf8;
            --pastel-sky: #c2e2f4;
            --pastel-mint: #cdeee6;
            --pastel-peach: #f7d4bf;
            --pastel-lav: #e0c6f2;
            --accent: #6b3be8;
            --text: #253238;
            --muted: #606366;

            /* Common width for all fields */
            --field-width: 300px;
        }

        * {
            box-sizing: border-box;
        }

        /* PAGE BACKGROUND */

        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, var(--pastel-sky) 0%, var(--bg) 65%);
            overflow: hidden;
        }

        /* PASTEL GLOW */

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(130deg,
                    var(--pastel-peach),
                    var(--pastel-lav),
                    var(--pastel-mint));
            filter: blur(70px);
            opacity: .65;
            z-index: -1;
            animation: moveBg 20s linear infinite;
        }

        @keyframes moveBg {
            0% {
                transform: translateX(-6%) scale(1.02);
            }

            50% {
                transform: translateX(6%) scale(1.04);
            }

            100% {
                transform: translateX(-6%) scale(1.02);
            }
        }

        /* SIGNUP CARD */

        .signup-container {
            width: 390px;
            padding: 40px 35px;
            border-radius: 22px;
            background: rgba(255, 255, 255, .92);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 45px rgba(35, 35, 55, .15);
            text-align: center;
            animation: fadeIn .6s ease;
        }

        /* TITLE */

        .signup-container h2 {
            margin-bottom: 25px;
            font-weight: 700;
            font-size: 26px;
            color: var(--text);
        }

        /* FORM */

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* INPUT GROUP */

        .input-group {
            margin-bottom: 18px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .input-group input {
            width: var(--field-width);
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #e6e6e6;
            font-size: 15px;
            outline: none;
            transition: .25s;
            background: #ffffff;
        }

        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 8px rgba(107, 59, 232, .25);
        }

        /* PASSWORD WRAPPER */

        .password-wrapper {
            position: relative;
            width: var(--field-width);
        }

        .password-wrapper input {
            width: 100%;
            padding: 14px 45px 14px 16px;
        }

        /* PASSWORD EYE */

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            color: #666;
            transition: .2s;
        }

        .toggle-password:hover {
            color: var(--accent);
        }

        /* SIGNUP BUTTON */

        .btn-signup {
            width: var(--field-width);
            padding: 14px;
            border: none;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: linear-gradient(90deg, var(--accent), #8a6cff);
            cursor: pointer;
            transition: .25s;
        }

        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(107, 59, 232, .3);
        }

        /* ERROR */

        .error {
            color: #e63946;
            font-size: 14px;
            margin-bottom: 10px;
        }

        /* LINKS */

        .extra-links {
            margin-top: 20px;
            font-size: 14px;
            color: var(--muted);
        }

        .extra-links a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }

        /* ANIMATION */

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* MOBILE */

        @media (max-width: 450px) {
            .signup-container {
                width: 92%;
                padding: 28px;
            }

            :root {
                --field-width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="signup-container">

        <h2>Create an Account <i class="bi bi-person-circle"></i></h2>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        <form method="post" action="/signup">

            <div class="input-group">
                <input type="text" name="name" placeholder="Full Name" required>
                <i class="fas fa-user"></i>
            </div>

            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required>
                <i class="fas fa-id-badge"></i>
            </div>

            <div class="input-group">
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Password" required>
                    <i class="bi bi-eye-slash-fill toggle-password" id="togglePassword"></i>
                </div>
            </div>

            <button type="submit" class="btn-signup">Sign Up</button>

        </form>

        <div class="extra-links">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}">Login</a></p>
        </div>

    </div>

    <script>
        const togglePassword = document.getElementById("togglePassword");
        const password = document.getElementById("password");

        togglePassword.addEventListener("click", function () {

            const type =
                password.getAttribute("type") === "password"
                    ? "text"
                    : "password";

            password.setAttribute("type", type);

            this.classList.toggle("bi-eye");
            this.classList.toggle("bi-eye-slash-fill");
        });
    </script>

</body>

</html>
