<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Travel Tips & Culture Info | AI Tour Planner</title>

  <!-- Google Font (matches main theme) -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- FontAwesome (kept for icons) -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous" defer></script>

  <style>
    /* ========================
       Main pastel theme variables (same as your main file)
       ======================== */
    :root{
      --bg: #fffaf8;
      --surface: #ffffff;
      --pastel-sky: #c2e2f4;
      --pastel-mint: #cdeee6;
      --pastel-peach:#f7d4bf;
      --pastel-lav:  #e0c6f2;
      --pastel-sand: #ffe8c9;
      --accent:     #6b3be8;
      --text: #253238;
      --muted: #606366;
      --radius: 14px;
      --card-shadow: 0 18px 40px rgba(35,35,55,0.10);
      --glass: rgba(255,255,255,0.88);
      --focus: 3px rgba(107,59,232,0.18);
    }

    html,body{height:100%;}
    body{
      margin:0;
      font-family: "Poppins", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: linear-gradient(180deg, var(--pastel-sky) 0%, var(--bg) 62%);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      overflow-x:hidden;
    }

    /* PREFERS REDUCED MOTION */
    @media (prefers-reduced-motion: reduce){
      *{ animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition: none !important; }
    }

    /* NAVBAR (same as main) */
    .navbar{
      background: linear-gradient(90deg, rgba(255,255,255,0.78), rgba(255,255,255,0.72));
      padding:1.05rem 1rem;
      transition: padding .28s ease, box-shadow .28s ease, backdrop-filter .28s ease;
      z-index:60;
      backdrop-filter: blur(6px);
      box-shadow: 0 6px 18px rgba(20,20,30,0.04);
    }
    .navbar.shrink{
      padding:.46rem 1rem;
      box-shadow: 0 12px 28px rgba(20,20,30,0.07);
      backdrop-filter: blur(8px);
    }
    .navbar .navbar-brand{
      font-weight:800;
      color:var(--text);
      letter-spacing:.2px;
    }
    .nav-link{
      color:var(--text) !important;
      font-weight:500;
      transition: color .18s ease, transform .18s ease;
    }
    .nav-link:hover{
      color:var(--accent) !important;
      transform: translateY(-2px);
    }
    .nav-link:focus{
      outline: none;
      box-shadow: 0 0 0 var(--focus);
      border-radius: 6px;
    }
    .nav-link.active{ color: var(--accent) !important; }

    /* Hero/section header with subtle pastel background */
    .page-hero{
      padding-top:110px;
      padding-bottom:10px;
      text-align:center;
    }
    .page-hero h2{
      margin:0;
      font-size:clamp(1.4rem,3.2vw,2.2rem);
      font-weight:800;
      color:var(--text);
    }
    .page-hero p.muted{ color:var(--muted); margin-top:8px; }

    /* floating pastel shapes (visual from main) */
    .shape{
      position:absolute;
      border-radius:50%;
      opacity:.45;
      mix-blend-mode:screen;
      filter:blur(10px);
      animation: floatY 8s ease-in-out infinite;
      will-change: transform;
      z-index:0;
    }
    .shape.s1{ width:280px; height:280px; left:-60px; top:8%; background:var(--pastel-mint); animation-duration:9s; }
    .shape.s2{ width:220px; height:220px; right:-40px; top:6%; background:var(--pastel-lav); animation-duration:10.5s; }
    .shape.s3{ width:160px; height:160px; left:6%; bottom:6%; background:var(--pastel-peach); animation-duration:8.5s; }
    @keyframes floatY{
      0%{ transform: translateY(0) rotate(0deg) }
      50%{ transform: translateY(-12px) rotate(3deg) }
      100%{ transform: translateY(0) rotate(0deg) }
    }

    /* content panel (glass) */
    .panel {
      margin-top:18px;
      background: var(--glass);
      padding: 22px;
      border-radius:18px;
      box-shadow: var(--card-shadow);
      position:relative;
      z-index:2;
    }

    /* Gallery */
    .gallery img {
      border-radius: 12px;
      height: 220px;
      object-fit: cover;
      box-shadow: 0 8px 20px rgba(30,30,50,0.08);
      transition: transform .28s ease, box-shadow .28s ease;
    }
    .gallery img:hover { transform: translateY(-6px) scale(1.03); box-shadow: 0 18px 40px rgba(30,30,50,0.12); }

    /* Buttons (match main CTA style) */
    .btn-primary-custom {
      display:inline-block;
      padding:10px 22px;
      border-radius:999px;
      background: linear-gradient(90deg, var(--accent), #8a6cff);
      color:#fff;
      font-weight:700;
      border:none;
      box-shadow:0 12px 30px rgba(107,59,232,0.12);
      transition: transform .18s ease, box-shadow .18s ease;
    }
    .btn-primary-custom:hover{ transform: translateY(-4px); }

    /* result / output boxes */
    .output-box {
      margin-top:14px;
      padding:14px;
      border-radius:12px;
      box-shadow:0 10px 30px rgba(40,40,90,0.04);
      background: linear-gradient(180deg, rgba(255,255,255,0.92), #fff);
      color: var(--text);
    }

    /* footer (same look as main) */
    footer{ padding:36px 0; background: linear-gradient(90deg, var(--pastel-sand), rgba(255,255,255,0.9)); color:var(--text); margin-top:24px; }
    footer a{ color:var(--text); text-decoration:none; }
    footer a:hover{ color:var(--accent); text-decoration:underline; }

    /* small responsive tweaks */
    @media (max-width:768px){
      .page-hero{ padding-top:90px }
      .gallery img{ height:160px }
      .panel{ padding:16px }
    }
  </style>
</head>
<body>

  <!-- decorative pastel shapes -->
  <div class="shape s1" aria-hidden="true"></div>
  <div class="shape s2" aria-hidden="true"></div>
  <div class="shape s3" aria-hidden="true"></div>

  <!-- NAVBAR (identical styling to main theme) -->
  <nav class="navbar navbar-expand-lg fixed-top" role="navigation" aria-label="Primary navigation">
    <div class="container">
      <a class="navbar-brand" href="/">AI Tour Planner</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/sightseeing_suggestion">Locations</a></li>
          <li class="nav-item"><a class="nav-link" href="/hotel">Hotels</a></li>
          <li class="nav-item"><a class="nav-link" href="/dynamic">Schedule</a></li>
          <li class="nav-item"><a class="nav-link" href="/budget_management">Budget Planner</a></li>
          <li class="nav-item"><a class="nav-link active" href="/tips" aria-current="page">Culture Tips</a></li>
          <li class="nav-item"><a class="nav-link" href="/findmyway">Find My Way</a></li>
          <li class="nav-item"><a class="nav-link" href="/routefinder">Route Finder</a></li>
          <li class="nav-item"><a class="nav-link" href="/hotels_reviews">Reviews</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hero / header -->
  <header class="page-hero container text-center" role="banner" aria-label="Travel Tips hero">
    <h2>🌍 Travel Culture & Tips</h2>
    <p class="muted">Local culture, food recommendations and practical advice for safe & delightful travel.</p>
  </header>

  <!-- Main content panel (keeps original functionality) -->
  <main class="container panel" id="main-content" role="main">
    <!-- Gallery -->
    <div class="row g-4 gallery">
      <div class="col-md-3"><img src="/static/images/Travel13.jpg" class="w-100" alt="Culture"></div>
      <div class="col-md-3"><img src="/static/images/Travel14.jpg" class="w-100" alt="Tradition"></div>
      <div class="col-md-3"><img src="/static/images/Travel15.jpg" class="w-100" alt="Food"></div>
      <div class="col-md-3"><img src="/static/images/Travel16.jpg" class="w-100" alt="Local Experience"></div>
    </div>

    <!-- Form & buttons -->
    <div class="mt-4">
      <label for="state" class="form-label">Enter State:</label>
      <input type="text" id="state" class="form-control mb-3" placeholder="e.g., Punjab, Kerala, Rajasthan" required>

      <div class="text-center">
        <button onclick="fetchCultureInfo()" class="btn-primary-custom me-2"><i class="fas fa-globe"></i> Show Culture Info</button>
        <button onclick="showTips()" class="btn-primary-custom"><i class="fas fa-lightbulb"></i> Show General Travel Tips</button>
      </div>

      <div id="info" class="output-box mt-4" style="display:none;"></div>
      <div id="tips" class="output-box mt-4" style="display:none;"></div>
    </div>
  </main>

  <!-- Footer (same general footer as main) -->
  <footer>
    <div class="container text-center">

      <hr>
      <p>&copy; 2025 GNDEC | Designed by G13</p>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>

  <!-- Keep original page JS and endpoints intact -->
  <script>
    async function fetchCultureInfo() {
      const state = document.getElementById("state").value.trim();
      const infoDiv = document.getElementById("info");
      infoDiv.style.display = "none";

      if (!state) {
        alert("Please enter a state name.");
        return;
      }

      try {
        const response = await fetch("/get_tips_info", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ state })
        });

        const result = await response.json();

        if (result.error) {
          infoDiv.innerHTML = `<strong>Error:</strong> ${result.error}`;
        } else {
          infoDiv.innerHTML = `
            <div style="font-weight:700; margin-bottom:8px;">${result.state_name ? result.state_name : state}</div>
            <strong>Famous Food:</strong> ${result.food || 'N/A'}<br>
            <strong>Language Spoken:</strong> ${result.language || 'N/A'}<br>
            ${result.notes ? `<div style="margin-top:8px;">${result.notes}</div>` : ''}
          `;
        }
      } catch (err) {
        infoDiv.innerHTML = `<strong>Error:</strong> Could not fetch data.`;
      }

      infoDiv.style.display = "block";
      // smooth scroll to results
      infoDiv.scrollIntoView({behavior:'smooth', block:'center'});
    }

    function showTips() {
      const tipsDiv = document.getElementById("tips");
      tipsDiv.innerHTML = `
        <h5 style="margin-top:0;">✨ General Travel Tips:</h5>
        <ul style="text-align:left; padding-left:20px; margin:0;">
          <li>Stay hydrated and carry a water bottle.</li>
          <li>Learn a few basic phrases in the local language.</li>
          <li>Respect local traditions and dress codes.</li>
          <li>Keep copies of important documents.</li>
          <li>Try local food at trusted places — check hygiene.</li>
          <li>Use local transport for authentic experiences.</li>
          <li>Travel light and keep emergency contacts handy.</li>
        </ul>
      `;
      tipsDiv.style.display = "block";
      tipsDiv.scrollIntoView({behavior:'smooth', block:'center'});
    }

    // Shrink navbar on scroll (same as main)
    (function(){
      const nav = document.querySelector('.navbar');
      const shrinkPoint = 80;
      const onScroll = () => { window.scrollY > shrinkPoint ? nav.classList.add('shrink') : nav.classList.remove('shrink') };
      window.addEventListener('scroll', onScroll, { passive:true }); onScroll();
    })();
  </script>
</body>
</html>
