<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Trip Planner</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

  <style>
    body { font-family: 'Poppins', sans-serif; background-color: #fffdfb; margin: 0; padding: 0; }
    .navbar { background: #f6c78a; }
    .planner-container { max-width: 720px; margin: 60px auto 40px; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 18px rgba(0,0,0,0.12); }
    .form-control, .form-select { border-radius: 30px; }
    .btn-custom { background: #7c4dff; color: #fff; border-radius: 30px; padding: 10px 20px; border: none; }
    .btn-custom:hover { background: #5a36d9; }
    .time-group { display:flex; gap:8px; align-items:center; }
    .time-group .form-select { width: 95px; border-radius: 30px; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin: 100px auto 30px; padding: 0 20px; }
    .gallery img { width: 100%; height: 200px; object-fit: cover; border-radius: 15px; box-shadow: 0 3px 8px rgba(0,0,0,0.15); transition: transform 0.3s ease; }
    .gallery img:hover { transform: scale(1.05); }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg fixed-top shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">AI Tour Planner</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/home">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/sightseeing_suggestions">Locations</a></li>
        <li class="nav-item"><a class="nav-link" href="/hotel">Hotels</a></li>
        <li class="nav-item"><a class="nav-link active" href="/dynamic">Schedule</a></li>
        <li class="nav-item"><a class="nav-link" href="/budget_management">Budget Planner</a></li>
        <li class="nav-item"><a class="nav-link" href="/findmyway">Find My Way</a></li>
        <li class="nav-item"><a class="nav-link" href="/routefinder">Route Finder</a></li>
        <li class="nav-item"><a class="nav-link" href="/hotels_reviews">Reviews</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- 🌍 Travel Inspiration Gallery -->
<div class="gallery">
  <img src="/static/images/travel201.jpg" alt="Travel 1">
  <img src="/static/images/S101.jpg" alt="Travel 2">
  <img src="/static/images/travel202.jpg" alt="Travel 3">
  <img src="/static/images/S102.jpg" alt="Travel 4">
  <img src="/static/images/travel203.jpg" alt="Travel 5">
  <img src="/static/images/S103.jpg" alt="Travel 6">
</div>

<!-- 📝 Trip Planner Form -->
<div class="planner-container">
  <h3 class="text-center">Plan Your Trip ✈️</h3>

  {% if error_message %}
    <div class="alert alert-danger">{{ error_message }}</div>
  {% endif %}

  <form action="/schedule" method="POST" class="row g-3">
    <div class="col-md-6">
      <input type="text" class="form-control" name="state" placeholder="Enter State" required>
    </div>
    <div class="col-md-6">
      <input type="text" class="form-control" name="city" placeholder="Enter City" required>
    </div>

    <div class="col-md-4">
      <input type="number" class="form-control" name="people" placeholder="Number of People" min="1" required>
    </div>
    <div class="col-md-4">
      <input type="number" class="form-control" name="days" placeholder="Number of Days" min="1" required>
    </div>
    <div class="col-md-4">
      <input type="number" step="0.01" class="form-control" name="budget" placeholder="Total Budget (INR)" required>
    </div>

    <!-- Start time with AM/PM select -->
    <div class="col-md-6">
      <label class="form-label">Preferred Start Time</label>
      <div class="time-group">
        <input type="time" class="form-control" name="start_time" required>
        <select class="form-select" name="start_ampm" required>
          <option value="AM">AM</option>
          <option value="PM" selected>PM</option>
        </select>
      </div>
    </div>

    <!-- End time with AM/PM select -->
    <div class="col-md-6">
      <label class="form-label">Preferred End Time</label>
      <div class="time-group">
        <input type="time" class="form-control" name="end_time" required>
        <select class="form-select" name="end_ampm" required>
          <option value="AM">AM</option>
          <option value="PM" selected>PM</option>
        </select>
      </div>
    </div>

    <div class="col-12 text-center mt-3">
      <button type="submit" class="btn btn-custom">Generate My Schedule</button>
    </div>
  </form>
</div>

<!-- Footer -->
<footer class="text-center py-4">
  <p>&copy; 2025 GNDEC | Designed by G13</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
